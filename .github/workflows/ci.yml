name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  rcm-invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: Regenerate claims data, rebuild metrics, verify invariants
        run: pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image and run pipeline + tests inside the container
        run: |
          docker build -t rcm-analytics .
          docker run --rm rcm-analytics
